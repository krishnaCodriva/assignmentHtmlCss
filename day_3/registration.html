<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>

<style>


body {
    font-family: Arial, sans-serif;
    background-image: url("https://www.shutterstock.com/image-vector/data-center-worker-600w-1320077870.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    
    display: flex;
    justify-content: flex-start; 
    align-items: center;
    height: 100vh;
}

.container {
    background-color: rgb(240, 240, 236);
    padding: 25px;
    border-radius: 20px;
    width: 800px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
h2 {
    text-align: center;
}
label {
    font-weight: bold;
    display: block;
    margin-top: 10px;
}
input, select, textarea {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    border-radius: 5px;
    border: 1px solid #ccc;
}
.hint {
    display: none;
    color: #555;
    font-size: 12px;
}

input:focus + .hint {
    display: block;
}
.radio-group, .checkbox-group {
    margin-top: 5px;
}
.inline {
    width: auto;
}
button {
    margin-top: 15px;
    width: 100%;
    padding: 10px;
    background-color: green;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
}
button:hover {
    background-color: darkgreen;
}
</style>
</head>

<body>

<div class="container">

<form>

<h2>Registration Form</h2>

<label for="name">Full Name</label>
<input type="text" id="name" required pattern="[A-Za-z ]{3,}" placeholder="Enter full name">
<small class="hint">Only letters, minimum 3 characters</small>

<label for="email">Email</label>
<input type="email" id="email" required placeholder="Enter email">

<label for="phone">Phone Number</label>
<input type="tel" id="phone" required pattern="[0-9]{10}" placeholder="10 digit number">
<small class="hint">Enter 10 digit number</small>

<label for="password">Password</label>
<input type="password" id="password" required minlength="6">

<label for="dob">Date of Birth</label>
<input type="date" id="dob" required>

<label>Gender</label>
<div class="radio-group">
<input type="radio" name="gender" class="inline" required> Male
<input type="radio" name="gender" class="inline"> Female
<input type="radio" name="gender" class="inline"> Other
</div>



<label>Skills</label>
<div class="checkbox-group">
<input type="checkbox" class="inline"> HTML
<input type="checkbox" class="inline"> CSS
<input type="checkbox" class="inline"> JavaScript
</div>

<label for="city">City</label>
<select id="city" required>
<option value="">Select City</option>
<option>Delhi</option>
<option>Noida</option>
<option>Lucknow</option>
<option>Kanpur</option>
</select>

<label for="address">Address</label>
<textarea id="address" rows="3" required></textarea>

<button type="submit">Register</button>

</form>

</div>
<!-- change -->

</body>
</html>
