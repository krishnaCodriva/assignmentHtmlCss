<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Basic SEO -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registration Form | Krishna Awasthi</title>

    <meta name="description" content="User registration form with validation built using semantic HTML and CSS">
    <meta name="keywords" content="registration form, HTML form, semantic HTML, CSS form">
    <meta name="author" content="Krishna Awasthi">

    <!-- Favicon -->
    <link rel="icon" href="favicon.ico">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: url("bg.jpg") no-repeat center/cover;
            margin: 0;
        }

        header {
            background: #222;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background: #444;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
            font-weight: bold;
        }

        main {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            height: calc(100vh - 160px);
            padding-left: 60px;
        }

        section {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 400px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        fieldset {
            border: 1px solid #ccc;
            margin-top: 15px;
            padding: 10px;
        }

        legend {
            font-weight: bold;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }

        .inline {
            width: auto;
            display: inline-block;
            margin-right: 10px;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }

        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>

<header>
    <h1>User Registration</h1>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<main>
<section>
<article>

<h2>Registration Form</h2>

<form action="#" method="POST">

<fieldset>
<legend>Personal Information</legend>

<label for="name">Full Name</label>
<input type="text" id="name" name="fullname" required pattern="[A-Za-z ]{3,}" placeholder="Enter full name">

<label for="email">Email</label>
<input type="email" id="email" name="email" required>

<label for="phone">Phone</label>
<input type="tel" id="phone" name="phone" pattern="[0-9]{10}" required>

<label for="password">Password</label>
<input type="password" id="password" name="password" minlength="6" required>

</fieldset>

<fieldset>
<legend>Gender</legend>

<input class="inline" type="radio" id="male" name="gender" value="male" required>
<label class="inline" for="male">Male</label>

<input class="inline" type="radio" id="female" name="gender" value="female">
<label class="inline" for="female">Female</label>

<input class="inline" type="radio" id="other" name="gender" value="other">
<label class="inline" for="other">Other</label>

</fieldset>

<fieldset>
<legend>Skills</legend>

<input class="inline" type="checkbox" id="html" name="skills" value="html">
<label class="inline" for="html">HTML</label>

<input class="inline" type="checkbox" id="css" name="skills" value="css">
<label class="inline" for="css">CSS</label>

<input class="inline" type="checkbox" id="js" name="skills" value="js">
<label class="inline" for="js">JavaScript</label>

</fieldset>

<label for="city">City</label>
<select id="city" name="city" required>
<option value="">Select City</option>
<option>Delhi</option>
<option>Noida</option>
<option>Lucknow</option>
</select>

<label for="address">Address</label>
<textarea id="address" name="address" rows="3" required></textarea>

<button type="submit">Register</button>

</form>

</article>
</section>
</main>

<footer>
<p>© 2026 Krishna Awasthi | All Rights Reserved</p>
</footer>

</body>
</html>
