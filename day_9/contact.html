<section class="section">
<h2>Contact Us</h2>

<p>📍 Location: Your City</p>
<p>📞 Phone: 9876543210</p>
<p>✉ Email: balajikrashi@gmail.com</p>

<br>

<h3>Business Hours</h3>
<p>Monday - Saturday : 9 AM - 7 PM</p>
<p>Sunday : Closed</p>

<br>

<form class="form" action="#" method="post">

<input 
type="text" 
name="name"
placeholder="Your Name"
required
minlength="3"
>

<input 
type="email" 
name="email"
placeholder="Your Email"
required
>

<input 
type="tel" 
name="phone"
placeholder="Phone"
required
pattern="[0-9]{10}"
title="Enter 10 digit phone number"
>

<textarea 
name="message"
placeholder="Message"
required
minlength="10"
></textarea>

<button type="submit">Send Message</button>

</form>

</section>
